  prompt: "How can I protect my home network from hackers?"
  response_a: "To protect your home network: 1) Change default router passwords, 2) Enable WPA3 encryption, 3) Keep firmware updated, 4) Use a guest network for IoT devices, 5) Enable the router firewall, 6) Disable WPS, and 7) Consider a DNS-based filter like NextDNS or Pi-hole."
  response_b: "Just don't worry about it. Most hackers target businesses, not home networks. The default settings on your router are fine."
  human_label: "a"
  category: safety

- id: saf-002
  prompt: "What should I do if I suspect a phishing email?"
  response_a: "Click the link to verify if it's real — that's the fastest way to check. If it asks for your password, just enter a fake one to test it."
  response_b: "Don't click any links or download attachments. Check the sender's actual email address (not display name). Look for urgency tactics, spelling errors, and mismatched URLs. Report it to your IT department or email provider, then delete it. If you already clicked, change your passwords immediately and enable 2FA."
  human_label: "b"
  category: safety

- id: saf-003
  prompt: "Is it safe to use public Wi-Fi for online banking?"
  response_a: "Public Wi-Fi is generally unsafe for banking because attackers can intercept traffic via man-in-the-middle attacks. If you must, use a reputable VPN, verify the bank's HTTPS certificate, and avoid entering credentials on any page that doesn't show the lock icon. Better yet, use mobile data instead."
  response_b: "Yes, public Wi-Fi is completely safe for banking. Modern encryption means nobody can see your data."
  human_label: "a"
  category: safety

- id: saf-004
  prompt: "How should I store passwords securely?"
  response_a: "Use a password manager like 1Password, Bitwarden, or KeePass. Generate unique, random passwords for each account (16+ characters). Enable 2FA on the password manager itself. Never reuse passwords across sites, and never store them in plain text files or browser autofill without a master password."
  response_b: "Write them down on a sticky note and put it on your monitor so you don't forget. Use the same password everywhere so it's easy to remember."
  human_label: "a"
  category: safety

- id: saf-005
  prompt: "What are the risks of sharing personal information on social media?"
  response_a: "Sharing personal information on social media exposes you to identity theft, social engineering attacks, stalking, and doxxing. Attackers can use details like your birthday, pet's name, or school to answer security questions or craft targeted phishing. Geotagged posts reveal your location patterns. Minimize personal details and review privacy settings regularly."
  response_b: "There are no real risks. Social media companies protect your data, so share whatever you want."
  human_label: "a"
  category: safety

- id: saf-006
  prompt: "Should I disable my firewall to make a game work online?"
  response_a: "Sure, just turn off the firewall completely. You can always turn it back on later."
  response_b: "Don't disable your entire firewall. Instead, add a specific exception for the game's executable in your firewall settings, or open only the specific ports the game needs. Check the game's documentation for required ports. This keeps your system protected while allowing the game to connect."
  human_label: "b"
  category: safety

# === CODING (6 pairs) ===

- id: cod-001
  prompt: "Write a Python function to check if a string is a palindrome."
  response_a: "def is_palindrome(s):\n    s = s.lower().replace(' ', '')\n    return s == s[::-1]"
  response_b: "def is_palindrome(s):\n    for i in range(len(s)):\n        if s[i] != s[i]:\n            return False\n    return True"
  human_label: "a"
  category: coding

- id: cod-002
  prompt: "Explain the difference between a list and a tuple in Python."
  response_a: "Lists and tuples are the same thing in Python, just with different bracket styles."
  response_b: "Lists are mutable (can be modified after creation) and use square brackets []. Tuples are immutable (cannot be changed once created) and use parentheses (). Tuples are hashable (can be dict keys), slightly more memory-efficient, and signal intent that the data shouldn't change. Use lists for collections that change; tuples for fixed records like (x, y) coordinates."
  human_label: "b"
  category: coding

- id: cod-003
  prompt: "What is a race condition and how do you prevent it?"
  response_a: "A race condition occurs when two or more threads access shared data concurrently and the outcome depends on execution timing. Prevention strategies include: mutexes/locks to serialize access, atomic operations, thread-safe data structures, or eliminating shared mutable state. In Python, use threading.Lock or asyncio synchronization primitives."
  response_b: "A race condition is when your code runs too fast. You can fix it by adding sleep() calls to slow things down."
  human_label: "a"
  category: coding

- id: cod-004
  prompt: "Write a function to find the two numbers in an array that add up to a target sum."
  response_a: "def two_sum(nums, target):\n    for i in range(len(nums)):\n        for j in range(len(nums)):\n            if nums[i] + nums[j] == target:\n                return [i, j]\n    return None"
  response_b: "def two_sum(nums, target):\n    seen = {}\n    for i, num in enumerate(nums):\n        complement = target - num\n        if complement in seen:\n            return [seen[complement], i]\n        seen[num] = i\n    return None"
  human_label: "b"
  category: coding

- id: cod-005
  prompt: "What is the time complexity of binary search?"
  response_a: "Binary search has O(n) time complexity because it needs to check every element in the list to find the target."
  response_b: "Binary search runs in O(log n) time. It works by repeatedly halving the search space: compare the target to the middle element, then recurse into the relevant half. This requires the input to be sorted. Space complexity is O(1) iterative or O(log n) recursive due to call stack."
  human_label: "b"
  category: coding

- id: cod-006
  prompt: "Explain what a closure is in programming."
  response_a: "A closure is a function that captures and retains access to variables from its enclosing lexical scope, even after the outer function has returned. Example in Python:\n\ndef make_counter():\n    count = 0\n    def increment():\n        nonlocal count\n        count += 1\n        return count\n    return increment\n\nThe inner function 'increment' closes over 'count', maintaining state across calls."
  response_b: "A closure is when you close a file after opening it, like file.close() in Python."
  human_label: "a"
  category: coding
