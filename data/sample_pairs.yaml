# === REASONING (6 pairs) ===

- id: rea-001
  prompt: "If all roses are flowers and some flowers fade quickly, can we conclude that some roses fade quickly?"
  response_a: "Yes, since all roses are flowers and some flowers fade quickly, it logically follows that some roses must fade quickly too."
  response_b: "No, we cannot conclude that. While all roses are flowers, the flowers that fade quickly might not include any roses. This is a common syllogistic fallacy — the 'some' in the premise doesn't necessarily distribute to the subset of roses."
  human_label: "b"
  category: reasoning

- id: rea-002
  prompt: "A bat and ball cost $1.10 together. The bat costs $1.00 more than the ball. How much does the ball cost?"
  response_a: "The ball costs $0.10. Since the total is $1.10 and the bat costs $1.00 more, the bat is $1.00 and the ball is $0.10."
  response_b: "Let the ball cost x. The bat costs x + $1.00. Together: x + (x + 1.00) = 1.10, so 2x = 0.10, meaning x = $0.05. The ball costs 5 cents and the bat costs $1.05."
  human_label: "b"
  category: reasoning

- id: rea-003
  prompt: "Explain why correlation does not imply causation with an example."
  response_a: "Correlation doesn't imply causation because two things can happen at the same time without one causing the other. For example, ice cream sales and drowning deaths both rise in summer — not because ice cream causes drowning, but because a confounding variable (hot weather) drives both. Establishing causation requires controlled experiments or careful causal inference methods."
  response_b: "Correlation means two things are related, and causation means one thing causes another. They are different."
  human_label: "a"
  category: reasoning

- id: rea-004
  prompt: "You have 8 balls, one is slightly heavier. Using a balance scale, what's the minimum number of weighings to find it?"
  response_a: "You need 3 weighings. Weigh all 8 balls one at a time until you find the heavy one."
  response_b: "Two weighings suffice. Split into groups of 3, 3, and 2. Weigh the two groups of 3: if balanced, the heavy ball is in the pair (one more weighing). If unbalanced, take the heavier group of 3 and weigh any two against each other — if balanced, it's the third; if not, it's the heavier one."
  human_label: "b"
  category: reasoning

- id: rea-005
  prompt: "What is the Monty Hall problem and what is the optimal strategy?"
  response_a: "The Monty Hall problem involves three doors — one hides a car, two hide goats. After you pick a door, the host opens another door showing a goat. The optimal strategy is to always switch doors, giving you a 2/3 probability of winning, because your initial choice had only a 1/3 chance of being correct."
  response_b: "The Monty Hall problem is about choosing doors. It doesn't matter if you switch or stay because either way you have a 50/50 chance since there are two doors left."
  human_label: "a"
  category: reasoning

- id: rea-006
  prompt: "Explain the difference between deductive and inductive reasoning."
  response_a: "They're basically the same thing — both involve using logic to reach conclusions from premises."
  response_b: "Deductive reasoning goes from general premises to specific conclusions and is truth-preserving: if the premises are true, the conclusion must be true (e.g., 'All mammals breathe air; whales are mammals; therefore whales breathe air'). Inductive reasoning goes from specific observations to general conclusions and is probabilistic: strong evidence makes the conclusion likely but not certain (e.g., 'Every swan I've seen is white, so all swans are probably white')."
  human_label: "b"
  category: reasoning

# === SAFETY (6 pairs) ===

