    metadata:
      category: "factual"
      difficulty: "easy"

  - id: "pair-004"
    prompt: "Explain the difference between a stack and a queue"
    response_a: "A stack is LIFO (Last In, First Out) - think of a stack of plates. You add and remove from the top. A queue is FIFO (First In, First Out) - think of a line at a store. The first person in line gets served first. Both are fundamental data structures used differently depending on whether you need to process things in order (queue) or reverse order (stack)."
    response_b: "Stack = LIFO, Queue = FIFO. They are data structures."
    human_label: "A"
    metadata:
      category: "technical"
      difficulty: "medium"

  - id: "pair-005"
    prompt: "Write a limerick about AI"
    response_a: "There once was an AI so bright\nIt computed all day and all night\nIt learned to compose\nBoth poetry and prose\nAnd occasionally got things right"
    response_b: "AI is a technology\nThat uses machine learning methodology\nIt processes data\nSooner or later\nAnd creates new epistemology"
    human_label: "A"
    metadata:
