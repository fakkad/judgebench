  - id: "pair-003"
    prompt: "What is the capital of France?"
    response_a: "Paris"
    response_b: "The capital of France is Paris. It has been the capital since the 10th century and is the country's largest city, known for landmarks like the Eiffel Tower, the Louvre Museum, and Notre-Dame Cathedral."
