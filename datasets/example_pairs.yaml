name: "judge-eval-v1"
description: "30 manually labeled pairs for judge calibration"
pairs:
  - id: "pair-001"
    prompt: "Explain quantum computing to a 5-year-old"
    response_a: "Imagine you have a magic coin that can be both heads and tails at the same time! That's kind of like how a quantum computer works. Regular computers use coins that are either heads or tails, but quantum computers use these magic coins called qubits. When you have lots of magic coins together, they can solve puzzles super fast!"
    response_b: "Quantum computing uses qubits instead of classical bits to perform computations leveraging superposition and entanglement principles for exponential speedup on certain problem classes."
    human_label: "A"
    metadata:
      category: "explanation"
      difficulty: "easy"

  - id: "pair-002"
    prompt: "Write a haiku about programming"
    response_a: "Code flows like water\nBugs swim upstream in the night\nTests catch them at dawn"
    response_b: "Programming is fun\nI like to write code all day\nComputers are cool"
    human_label: "A"
    metadata:
